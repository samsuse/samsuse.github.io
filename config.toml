baseurl = "https://samsuse.com/"
languageCode = "en-us"
hasCJKLanguage = true
title = "Sam's Homepage"
theme = "diaspora"
themesDir = "./themes/"
googleAnalytics = "UA-78607015-1"

paginate = 1

# Define the disable PathToLower number of posts per page
disablePathToLower = true
summaryLength = 70

[params.iconshow]
    category = false
    series = false
    tag = false

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[permalinks]
    post = "/:year/:month/:day/:slug"

[params]
    # Tell me who you are
    author = "Sam"
    bio = "Sam | Blogger | Programmer"
    location = "Earth"
    site_description = "Sam's blog"
    since = 2015
    copyright  = "samsuse.com. All rights reserved."
    # avatar = "css/images/avatar.png"
    # Enter your email address to display your Gravatar icon in the profile. If not set the theme
    # will fallback to the avatar.
    # gravatar = ""
    logo = "img/favicon.ico"
    cover = "img/wallhaven-672007-2.png"
    # disable_mathjax = false # set to true to disable MathJax

    # define which types of pages should be shown. By default the type with the most regular pages
    # mainSections = ["posts"]

    # Format dates with Go's time formatting
    date_format = "January 2, 2006"

    # Add custom assets with their paths relative to the static folder
    # custom_css = []
    # custom_js  = []

